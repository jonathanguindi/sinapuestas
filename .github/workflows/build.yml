name: Construir descargas

# Compila el APK de Android y empaqueta el instalador de computadora,
# y los publica como archivos descargables en la release "latest"
# (los botones de la web apuntan a esos archivos).

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "desktop/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar componentes del SDK
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Compilar APK (debug, instalable)
        working-directory: android
        run: gradle --no-daemon assembleDebug

      - name: Renombrar APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk SinApuestas.apk

      - name: Empaquetar instalador de computadora
        run: |
          mkdir -p pack/SinApuestas-Computadora
          cp desktop/* pack/SinApuestas-Computadora/
          cd pack
          zip -r ../SinApuestas-Computadora.zip SinApuestas-Computadora

      - name: Publicar en la release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Última versión
          body: |
            Descargas listas para instalar. Generadas automáticamente desde `main`.

            - **SinApuestas.apk** — app de Android (activa el bloqueo desde un botón dentro de la app).
            - **SinApuestas-Computadora.zip** — instalador para Windows / macOS / Linux.
          files: |
            SinApuestas.apk
            SinApuestas-Computadora.zip
